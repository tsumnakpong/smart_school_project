{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto py-10 px-4 text-center">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">เช็คชื่อวิชา {{ schedule.subject.name_th }}</h1>
    <p class="text-gray-500 mb-8">ให้นักเรียนใช้มือถือสแกนรหัสนี้เพื่อเช็คชื่อ</p>

    <div class="bg-white p-10 rounded-3xl shadow-2xl inline-block border-8 border-indigo-600">
        <img id="qr-display" src="{{ qr_image }}" class="w-80 h-80 mx-auto">
        <div class="mt-4 flex items-center justify-center text-indigo-600 font-bold">
            <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-indigo-600 mr-2"></div>
            QR Code อัปเดตทุก 15 วินาที
        </div>
    </div>
</div>

<script>
    // อัปเดต QR อัตโนมัติด้วย AJAX
    setInterval(function() {
        fetch(window.location.href, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
        .then(response => response.json())
        .then(data => {
            document.getElementById('qr-display').src = data.qr_image;
        });
    }, 15000);
</script>
{% endblock %}
