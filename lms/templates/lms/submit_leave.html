{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto py-10 px-4">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-6 bg-indigo-600 text-white font-bold text-xl">
            บันทึกการแจ้งลาออนไลน์ 📝
        </div>
        <form method="POST" class="p-6 space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700">ประเภทการลา</label>
                <select name="leave_type" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
                    <option value="sick">ลาป่วย</option>
                    <option value="errand">ลากิจ</option>
                    <option value="other">อื่นๆ</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">ตั้งแต่วันที่</label>
                    <input type="date" name="start_date" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">ถึงวันที่</label>
                    <input type="date" name="end_date" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">เหตุผลการลา</label>
                <textarea name="reason" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" placeholder="ระบุเหตุผลที่จำเป็น..."></textarea>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">
                ส่งใบแจ้งลา
            </button>
        </form>
    </div>
</div>
{% endblock %}
